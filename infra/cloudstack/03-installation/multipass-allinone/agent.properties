# cloudstack-agent 설정 예시 — Apple Silicon ARM64 단일 노드 학습용
# 위치: /etc/cloudstack/agent/agent.properties
#
# 변경 후: systemctl restart cloudstack-agent
#
# 출처: https://docs.cloudstack.apache.org/en/latest/installguide/hypervisor/kvm.html

# === 기본 ===
hypervisor.type=kvm
host=192.168.64.5     # MS의 IP. 같은 VM이면 자기 자신
zone=1
pod=1
cluster=1
guid=               # 자동 생성됨

# === ARM64 (Apple Silicon) 한정 ===
guest.cpu.arch=aarch64
guest.cpu.mode=host-passthrough

# === 네트워크 브리지 ===
# 단일 노드 학습용: cloudbr0 하나로 모든 트래픽
network.bridge.type=native
private.bridge.name=cloudbr0
public.network.device=cloudbr0
private.network.device=cloudbr0
guest.network.device=cloudbr0

# === 스토리지 ===
local.storage.path=/var/lib/libvirt/images
domr.scripts.dir=/usr/share/cloudstack-agent/scripts/network/domr

# === libvirt URI (TCP) ===
libvirt.uri.type=tcp
libvirt.tcp.port=16509

# === 로그 ===
# 자세한 로그가 필요하면 DEBUG로
# log4j.rootLogger=INFO, FILE, CONSOLE
