[[local|localrc]]
# DevStack 단일 노드 학습용 최소 설정
# 실사용 시 비밀번호는 반드시 변경

# === 필수 ===
ADMIN_PASSWORD=secret
DATABASE_PASSWORD=$ADMIN_PASSWORD
RABBIT_PASSWORD=$ADMIN_PASSWORD
SERVICE_PASSWORD=$ADMIN_PASSWORD

# 호스트 IP — 본인 VM/노트북 IP로 교체
# `ip -4 addr show` 로 확인
HOST_IP=192.168.1.10

# 로그
LOGFILE=$DEST/logs/stack.sh.log
LOGDAYS=2
LOG_COLOR=False   # journalctl/less로 볼 때 깔끔

# === 기본 서비스 ===
# 자동 포함: keystone, nova, neutron, glance, cinder, horizon, placement
# 끄려면: disable_service <이름>

# === 선택: Advanced 서비스 ===
# 필요한 것만 주석 해제
# enable_plugin heat https://opendev.org/openstack/heat
# enable_plugin octavia https://opendev.org/openstack/octavia
# enable_plugin octavia-dashboard https://opendev.org/openstack/octavia-dashboard
# enable_plugin magnum https://opendev.org/openstack/magnum
# enable_plugin magnum-ui https://opendev.org/openstack/magnum-ui
# enable_plugin barbican https://opendev.org/openstack/barbican
# enable_plugin designate https://opendev.org/openstack/designate

# === 네트워크 (기본 OVN) ===
# Flat 외부망 설정 — Floating IP 풀이 여기서 나옴
FLOATING_RANGE=192.168.100.0/24
PUBLIC_NETWORK_GATEWAY=192.168.100.1

# === 속도 팁 ===
# GitHub 미러 사용 (opendev 느릴 때)
# GIT_BASE=https://github.com

# 특정 릴리스 고정 (안정성)
# 최신: master (기본) / 안정: stable/2024.1 등
# TARGET_BRANCH=stable/2024.1
